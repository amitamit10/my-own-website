<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Font Maker</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="letter">A</div>
  <p id="instruction">Re-photograph this letter, then tap capture.</p>
  <p id="mode-badge">Retry Mode</p>
  <button id="capture-btn">📸 Capture</button>
  <input type="file" id="file-input" accept="image/*" capture="environment" />
  <div id="preview" hidden>
    <img id="preview-img" alt="Captured photo preview" />
    <div class="preview-buttons">
      <button id="use-photo-btn" class="primary">✓ Use this photo</button>
      <button id="retake-btn">↻ Retake</button>
    </div>
  </div>
  <div id="result-preview" hidden>
    <p id="result-label">Background removed ✓</p>
    <div id="result-img-wrap">
      <img id="result-img" alt="Background removed result" />
    </div>
    <button id="next-btn">Next letter →</button>
  </div>
  <p id="status-msg" aria-live="polite" aria-atomic="true"></p>
  <p id="progress"></p>
  <p id="queue-label"></p>
  <p id="done-list"></p>
  <button id="reset-btn" class="reset-corner" title="Restart the retry list">↺ Restart retry list</button>

  <script>
    const letterEl = document.getElementById('letter');
    const modeBadgeEl = document.getElementById('mode-badge');
    const statusEl = document.getElementById('status-msg');
    const progressEl = document.getElementById('progress');
    const queueLabelEl = document.getElementById('queue-label');
    const doneEl = document.getElementById('done-list');
    const btn = document.getElementById('capture-btn');
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('preview-img');
    const usePhotoBtn = document.getElementById('use-photo-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const resetBtn = document.getElementById('reset-btn');
    const resultPreview = document.getElementById('result-preview');
    const resultImg = document.getElementById('result-img');
    const resultLabel = document.getElementById('result-label');
    const nextBtn = document.getElementById('next-btn');
    let targets = [];
    let current = null;

    async function loadConfig() {
      const config = await fetch('/config').then(r => r.json());
      targets = config.targets || [];
      modeBadgeEl.textContent = config.mode === 'retry' ? 'Retry Mode' : 'Capture Mode';
      resetBtn.textContent = config.resetLabel || 'Reset';
      resetBtn.title = config.resetDescription || 'Reset progress';
    }

    async function loadStatus() {
      const { done, remaining, mode } = await fetch('/status').then(r => r.json());
      current = remaining[0] || null;
      letterEl.textContent = current || '✓';
      progressEl.textContent = `${done.length}/${targets.length} retry letters updated`;
      queueLabelEl.textContent = remaining.length ? `Still to retake: ${remaining.join(' ')}` : 'Retry queue complete.';
      doneEl.textContent = done.length ? `Updated: ${done.join(' ')}` : 'Updated: none yet';
      btn.disabled = !current;
      btn.hidden = false;
      preview.hidden = true;
      resultPreview.hidden = true;
      if (!current) {
        statusEl.textContent = mode === 'retry'
          ? 'All retry letters updated.'
          : 'All letters captured!';
      } else {
        statusEl.textContent = '';
      }
    }

    function compressImage(file, maxPx = 1024, quality = 0.85) {
      return new Promise(resolve => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
        };
        img.src = url;
      });
    }

    async function uploadCurrentPhoto() {
      const file = fileInput.files[0];
      if (!file || !current) return;
      btn.disabled = true;
      usePhotoBtn.disabled = true;
      statusEl.textContent = 'Compressing…';
      const compressed = await compressImage(file);
      statusEl.textContent = 'Uploading…';
      const form = new FormData();
      form.append('char', current);
      form.append('photo', compressed, 'photo.jpg');
      try {
        const { ok, error } = await fetch('/upload', { method: 'POST', body: form }).then(r => r.json());
        if (ok) {
          const savedChar = current;
          preview.hidden = true;
          resultLabel.textContent = `"${savedChar}" — background removed ✓`;
          resultImg.src = `/letters/${savedChar}.png?t=${Date.now()}`;
          resultPreview.hidden = false;
          statusEl.textContent = '';
        } else {
          statusEl.textContent = `Error: ${error}`;
          btn.disabled = false;
        }
      } catch {
        statusEl.textContent = 'Upload failed, try again.';
        btn.disabled = false;
      }
      fileInput.value = '';
      usePhotoBtn.disabled = false;
    }

    btn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file || !current) return;
      const reader = new FileReader();
      reader.onload = () => {
        previewImg.src = reader.result;
        preview.hidden = false;
        btn.hidden = true;
      };
      reader.readAsDataURL(file);
    });

    usePhotoBtn.addEventListener('click', uploadCurrentPhoto);

    retakeBtn.addEventListener('click', () => {
      preview.hidden = true;
      previewImg.src = '';
      btn.hidden = false;
      fileInput.value = '';
      fileInput.click();
    });

    nextBtn.addEventListener('click', () => loadStatus());

    resetBtn.addEventListener('click', async () => {
      if (!confirm('Restart the retry list? This keeps your saved PNGs and lets you re-photograph the retry letters again.')) return;
      await fetch('/reset', { method: 'POST' });
      loadStatus();
    });

    async function init() {
      await loadConfig();
      await loadStatus();
    }

    init();
  </script>
</body>
</html>
