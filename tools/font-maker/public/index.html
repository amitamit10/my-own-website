<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Font Maker</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="letter">A</div>
  <p id="instruction">Form this letter with water, then tap capture.</p>
  <button id="capture-btn">📸 Capture</button>
  <input type="file" id="file-input" accept="image/*" capture="environment" />
  <div id="preview" hidden>
    <img id="preview-img" alt="Captured photo preview" />
    <div class="preview-buttons">
      <button id="use-photo-btn" class="primary">✓ Use this photo</button>
      <button id="retake-btn">↻ Retake</button>
    </div>
  </div>
  <div id="result-preview" hidden>
    <p id="result-label">Background removed ✓</p>
    <div id="result-img-wrap">
      <img id="result-img" alt="Background removed result" />
    </div>
    <button id="next-btn">Next letter →</button>
  </div>
  <p id="status-msg"></p>
  <p id="progress"></p>
  <p id="done-list"></p>
  <button id="reset-btn" class="reset-corner" title="Delete all captured letters">🗑 Reset all</button>

  <script>
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
    const letterEl = document.getElementById('letter');
    const statusEl = document.getElementById('status-msg');
    const progressEl = document.getElementById('progress');
    const doneEl = document.getElementById('done-list');
    const btn = document.getElementById('capture-btn');
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('preview-img');
    const usePhotoBtn = document.getElementById('use-photo-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const resetBtn = document.getElementById('reset-btn');
    const resultPreview = document.getElementById('result-preview');
    const resultImg = document.getElementById('result-img');
    const resultLabel = document.getElementById('result-label');
    const nextBtn = document.getElementById('next-btn');
    let current = null;

    async function loadStatus() {
      const { done, remaining } = await fetch('/status').then(r => r.json());
      current = remaining[0] || null;
      letterEl.textContent = current || '✓';
      progressEl.textContent = `${done.length}/${CHARS.length} captured`;
      doneEl.textContent = done.length ? `Done: ${done.join(' ')}` : '';
      btn.disabled = !current;
      btn.hidden = false;
      preview.hidden = true;
      resultPreview.hidden = true;
      if (!current) statusEl.textContent = 'All letters captured!';
    }

    async function uploadCurrentPhoto() {
      const file = fileInput.files[0];
      if (!file || !current) return;
      btn.disabled = true;
      usePhotoBtn.disabled = true;
      statusEl.textContent = 'Uploading…';
      const form = new FormData();
      form.append('char', current);
      form.append('photo', file);
      try {
        const { ok, error } = await fetch('/upload', { method: 'POST', body: form }).then(r => r.json());
        if (ok) {
          const savedChar = current;
          preview.hidden = true;
          resultLabel.textContent = `"${savedChar}" — background removed ✓`;
          resultImg.src = `/letters/${savedChar}.png?t=${Date.now()}`;
          resultPreview.hidden = false;
          statusEl.textContent = '';
        } else {
          statusEl.textContent = `Error: ${error}`;
          btn.disabled = false;
        }
      } catch {
        statusEl.textContent = 'Upload failed, try again.';
        btn.disabled = false;
      }
      fileInput.value = '';
      usePhotoBtn.disabled = false;
    }

    btn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file || !current) return;
      const reader = new FileReader();
      reader.onload = () => {
        previewImg.src = reader.result;
        preview.hidden = false;
        btn.hidden = true;
      };
      reader.readAsDataURL(file);
    });

    usePhotoBtn.addEventListener('click', uploadCurrentPhoto);

    retakeBtn.addEventListener('click', () => {
      preview.hidden = true;
      previewImg.src = '';
      btn.hidden = false;
      fileInput.value = '';
      fileInput.click();
    });

    nextBtn.addEventListener('click', () => loadStatus());

    resetBtn.addEventListener('click', async () => {
      if (!confirm('Delete all captured letters? This cannot be undone.')) return;
      await fetch('/reset', { method: 'POST' });
      loadStatus();
    });

    loadStatus();
  </script>
</body>
</html>
